<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>OmniSched</title>
    <style>
        /* ColorOS 深色模式设计规范变量 */
        :root {
            --bg:#0F0F10;--card:#1C1C1E;--primary:#2BA84A;--text:#F5F5F7;--sec:#8E8E93;--brd:#2C2C2E;--sw-off:#3A3A3C;
            --cb:cubic-bezier(0.3,0,0.1,1);
        }
        body { background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:24px 16px;margin:0;-webkit-tap-highlight-color:transparent }

        .card { background:var(--card);border-radius:28px;padding:20px 24px;border:1px solid var(--brd);margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.15) }
        .t { font-size:20px;font-weight:600;margin-bottom:6px }
        .st, .id { color:var(--sec);line-height:1.4 }
        .st { font-size:13px;margin-bottom:20px }
        .it { font-size:16px;font-weight:500;margin-bottom:4px }
        .id { font-size:12px;padding-right:16px }
        .li, .rh { display:flex;justify-content:space-between;align-items:center }
        .li { padding:16px 0;border-bottom:0.5px solid var(--brd) }
        .li:last-child { border:0;padding-bottom:0 }
        .rc { margin-top:16px;padding:12px 0 4px;border-bottom:0.5px solid var(--brd) }
        .rv { font-size:16px;font-weight:600;color:var(--primary) }

        .sw { position:relative;width:50px;height:28px;flex-shrink:0 }
        .sw input { display:none }
        .sl { position:absolute;inset:0;background:var(--sw-off);transition:.3s var(--cb);border-radius:28px;cursor:pointer }
        .sl:before { content:"";position:absolute;height:24px;width:24px;left:2px;bottom:2px;background:#fff;transition:.3s var(--cb);border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.2) }
        input:checked+.sl { background:var(--primary) }
        input:checked+.sl:before { transform:translateX(22px) }
        input[type=range] { -webkit-appearance:none;width:100%;height:8px;background:linear-gradient(to right,var(--primary) var(--pc,0%),var(--sw-off) var(--pc,0%));border-radius:8px;outline:0;margin-bottom:16px }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25) }
        select, textarea { width:100%;padding:12px;background:var(--sw-off);color:var(--text);border:none;border-radius:12px;font:inherit;font-size:14px;box-sizing:border-box }
        .toast { position:fixed;bottom:40px;left:50%;transform:translate(-50%,20px);background:rgba(30,30,32,0.9);backdrop-filter:blur(16px);padding:14px 24px;border-radius:16px;font-size:14px;opacity:0;visibility:hidden;transition:.4s var(--cb);z-index:99 }
        .toast.s { opacity:1;visibility:visible;transform:translate(-50%,0) }
    </style>
</head>
<body>
<div class="card">
    <div class="t">OmniSched 核心配置</div>
    <div class="st">动态资源分配与场景识别。</div>
    <div class="rc">
        <div class="rh"><div class="it">全局性能配置档</div></div>
        <select id="i_prof">
            <option value="balance">均衡 (动态场景切换)</option>
            <option value="performance">性能 (游戏模式)</option>
            <option value="powersave">省电 (算力钳制)</option>
        </select>
    </div>
    <div class="li">
        <div><div class="it">游戏场景识别</div><div class="id">自动侦测白名单，向游戏倾斜算力。</div></div>
        <label class="sw"><input type="checkbox" id="i_g"><span class="sl"></span></label>
    </div>
    <div class="li" style="border:0">
        <div><div class="it">Lite Mode</div><div class="id">轻量模式，兼顾续航与发热。</div></div>
        <label class="sw"><input type="checkbox" id="i_l"><span class="sl"></span></label>
    </div>
    <div class="rc" style="border:0">
        <textarea id="i_gl" rows="2" placeholder="游戏包名，换行分隔"></textarea>
    </div>
</div>
<div class="card">
    <div class="t">底层核心</div>
    <div class="rc">
        <div class="rh"><div class="it">巡检间隔 (秒)</div><div class="rv" id="v_i">950</div></div>
        <input type="range" id="i_i" min="300" max="3600" step="50" value="950">
    </div>
    <div class="li">
        <div><div class="it">强制 Vulkan 渲染</div><div class="id">Android 14+ 推荐，劫持 Ski底层引擎降低 GPU 负载。</div></div>
        <label class="sw"><input type="checkbox" id="i_v"><span class="sl"></span></label>
    </div>
    <div class="li">
        <div><div class="it">背景锁死小核</div><div class="id">将后台进程 Cpuset 隔离在小核集群，改善待机功耗。</div></div>
        <label class="sw"><input type="checkbox" id="i_b"><span class="sl"></span></label>
    </div>
</div>
<div id="toast" class="toast">设置已保存并生效</div>
<script>
    const P = "/data/adb/omnisched/config.json", _ = i => document.getElementById(i);
    const DEF = {
        poll_interval_seconds: 950,
        cpuset: { background_little_core_only: true },
        render: { force_vulkan: false },
        current_profile: "balance",
        game_mode_enabled: true,
        lite_mode_enabled: false,
        gamelist: ["com.miHoYo.Yuanshen,com.tencent.tmgp.dfm"]
    };
    let cfg = { ...DEF }, tm;
    const els = { i:_('i_i'), v:_('v_i'), vk:_('i_v'), bg:_('i_b'), prof:_('i_prof'), gm:_('i_g'), lm:_('i_l'), gl:_('i_gl'), t:_('toast') };
    const fill = e => e.style.setProperty('--pc', `${((e.value - e.min) / (e.max - e.min)) * 100}%`);

    async function load() {
        try {
            let r = await ksu.exec(`cat ${P}`), out = (typeof r === 'string' ? r : r?.stdout || "").trim();
            if (out.startsWith('{')) cfg = { ...cfg, ...JSON.parse(out) };
        } catch (e) {}
        els.i.value = cfg.poll_interval_seconds;
        els.v.textContent = cfg.poll_interval_seconds;
        els.vk.checked = cfg.render.force_vulkan;
        els.bg.checked = cfg.cpuset.background_little_core_only;
        els.prof.value = cfg.current_profile;
        els.gm.checked = cfg.game_mode_enabled;
        els.lm.checked = cfg.lite_mode_enabled;
        els.gl.value = cfg.gamelist.join('\n');
        fill(els.i);
    }
    async function save() {
        cfg = {
            ...cfg,
            poll_interval_seconds: parseInt(els.i.value),
            render: { force_vulkan: els.vk.checked },
            cpuset: { background_little_core_only: els.bg.checked },
            current_profile: els.prof.value,
            game_mode_enabled: els.gm.checked,
            lite_mode_enabled: els.lm.checked,
            gamelist: els.gl.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean)
        };
        await ksu.exec(`echo '${JSON.stringify(cfg)}' > ${P}`);
        clearTimeout(tm);
        els.t.classList.add('s');
        tm = setTimeout(() => els.t.classList.remove('s'), 2000);
    }
    els.i.oninput = e => { els.v.textContent = e.target.value; fill(e.target) };
    [els.i, els.vk, els.bg, els.prof, els.gm, els.lm, els.gl].forEach(el => el.onchange = save);
    load();
</script>
</body>
</html>
