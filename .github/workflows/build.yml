name: Build Zygisk OmniSched

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: zygisk-omnisched-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read Module Version
        id: module_version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          VERSION="${VERSION#v}"
          [ -n "$VERSION" ] || VERSION="0.0.0"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2.1
        with:
          cmake-version: "3.30.1"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Cache C++ Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-ndk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Build and Package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          MODULE_VERSION: ${{ steps.module_version.outputs.value }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DANDROID_STL=c++_static

          cmake --build build --config Release --parallel $(nproc)

          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip build/arm64-v8a.so
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip build/omnisched

          mkdir -p out/zygisk
          mkdir -p out/bin
          cp build/arm64-v8a.so out/zygisk/arm64-v8a.so
          cp build/omnisched out/bin/omnisched
          cp module.prop customize.sh out/
          cp module/post-fs-data.sh out/
          cp module/service.sh out/
          [ -d webroot ] && cp -r webroot out/

          cd out
          zip -r9 "../zygisk_omnisched-v${MODULE_VERSION}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk_omnisched-v${{ steps.module_version.outputs.value }}-${{ github.run_number }}
          path: zygisk_omnisched-v${{ steps.module_version.outputs.value }}.zip
